openapi: 3.1.0
info:
  title: The Volumn API
  version: 0.1.0
servers:
  - url: http://localhost:3000
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    refreshCookieAuth:
      type: apiKey
      in: cookie
      name: refreshToken
  schemas:
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service status
  /auth/register:
    post:
      summary: Register a new user
      description: Creates the user, returns an access token session payload, and sets a rotating refresh token cookie.
      responses:
        "201":
          description: Session created
        "409":
          description: Email already in use
        "429":
          description: Auth rate limit exceeded
  /auth/login:
    post:
      summary: Login
      description: Verifies credentials, returns an access token session payload, and sets a rotating refresh token cookie.
      responses:
        "200":
          description: Session created
        "401":
          description: Invalid credentials
        "429":
          description: Auth rate limit exceeded
  /auth/refresh:
    post:
      summary: Rotate refresh token and access token
      description: Uses the refresh token cookie to issue a fresh access token and a new refresh token cookie.
      security:
        - refreshCookieAuth: []
      responses:
        "200":
          description: Session refreshed
        "401":
          description: Missing, invalid, expired, or revoked refresh token
        "429":
          description: Auth rate limit exceeded
  /auth/logout:
    post:
      summary: Logout current session
      description: Invalidates the current refresh token session and clears the refresh token cookie.
      security:
        - refreshCookieAuth: []
      responses:
        "204":
          description: Logged out
  /users/me:
    get:
      summary: Get current user
      description: Returns the authenticated user's current profile summary for app bootstrap and profile rendering.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user profile
        "401":
          description: Missing, invalid, or expired access token
        "404":
          description: Authenticated user record was not found
    patch:
      summary: Update current user
      description: Updates the authenticated user's self-service profile fields in V0.1. Only `displayName` and `theme` are editable.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                displayName:
                  type: string
                  minLength: 2
                  maxLength: 80
                theme:
                  type: string
                  enum: [rose, green, black]
      responses:
        "200":
          description: Updated user profile
        "400":
          description: Invalid profile update payload
        "401":
          description: Missing, invalid, or expired access token
        "404":
          description: Authenticated user record was not found
  /workout-plans:
    get:
      summary: List workout plans
      description: Returns the authenticated user's workout plans ordered by most recently updated first.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Paginated workout plans
        "401":
          description: Missing, invalid, or expired access token
    post:
      summary: Create workout plan
      description: Creates an owned workout plan. Student users may create at most five plans.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 80
                accent:
                  type: string
                  nullable: true
                  enum: [rose, green, black, blue, amber, violet]
                focusLabel:
                  type: string
                  nullable: true
                  maxLength: 80
      responses:
        "201":
          description: Workout plan detail
        "400":
          description: Invalid workout plan payload
        "401":
          description: Missing, invalid, or expired access token
        "403":
          description: Student plan cap reached
  /workout-plans/{id}:
    get:
      summary: Get workout plan detail
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workout plan detail with ordered plan exercises and sets
        "401":
          description: Missing, invalid, or expired access token
        "404":
          description: Workout plan not found
    patch:
      summary: Update workout plan metadata
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 80
                accent:
                  type: string
                  nullable: true
                  enum: [rose, green, black, blue, amber, violet]
                focusLabel:
                  type: string
                  nullable: true
                  maxLength: 80
      responses:
        "200":
          description: Updated workout plan detail
        "400":
          description: Invalid workout plan payload
        "401":
          description: Missing, invalid, or expired access token
        "404":
          description: Workout plan not found
    delete:
      summary: Delete workout plan
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Workout plan deleted
        "401":
          description: Missing, invalid, or expired access token
        "404":
          description: Workout plan not found
  /workout-plans/{id}/exercises:
    post:
      summary: Add exercise to workout plan
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [exerciseId]
              properties:
                exerciseId:
                  type: string
                  format: uuid
      responses:
        "201":
          description: Updated workout plan detail after appending the exercise
        "400":
          description: Invalid request payload
        "401":
          description: Missing, invalid, or expired access token
        "404":
          description: Workout plan or exercise not found
  /workout-plans/{planId}/exercises/{planExerciseId}:
    delete:
      summary: Remove plan exercise
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: planId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: planExerciseId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Plan exercise removed
        "401":
          description: Missing, invalid, or expired access token
        "404":
          description: Workout plan or plan exercise not found
  /workout-plans/{planId}/exercises/reorder:
    patch:
      summary: Reorder plan exercises
      description: Reorders all plan exercises atomically. The payload must include the full exact current set of plan exercise IDs.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: planId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [orderedPlanExerciseIds]
              properties:
                orderedPlanExerciseIds:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    format: uuid
      responses:
        "200":
          description: Updated workout plan detail with normalized exercise ordering
        "400":
          description: Invalid reorder payload
        "401":
          description: Missing, invalid, or expired access token
        "404":
          description: Workout plan not found
  /workout-plans/{planId}/exercises/{planExerciseId}/sets:
    post:
      summary: Add plan set
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: planId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: planExerciseId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [setType]
              properties:
                setType:
                  type: string
                  enum: [WARM_UP, FEEDER, NORMAL, FAILURE, DROP_SET]
                targetReps:
                  type: integer
                  nullable: true
                  minimum: 1
                  maximum: 100
                targetLoadKg:
                  type: number
                  nullable: true
                  minimum: 0
                  maximum: 1000
                notes:
                  type: string
                  nullable: true
                  maxLength: 500
      responses:
        "201":
          description: Updated workout plan detail after appending the plan set
        "400":
          description: Invalid plan set payload
        "401":
          description: Missing, invalid, or expired access token
        "404":
          description: Workout plan or plan exercise not found
  /plan-sets/{setId}:
    patch:
      summary: Update plan set
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: setId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                setType:
                  type: string
                  enum: [WARM_UP, FEEDER, NORMAL, FAILURE, DROP_SET]
                targetReps:
                  type: integer
                  nullable: true
                  minimum: 1
                  maximum: 100
                targetLoadKg:
                  type: number
                  nullable: true
                  minimum: 0
                  maximum: 1000
                notes:
                  type: string
                  nullable: true
                  maxLength: 500
      responses:
        "200":
          description: Updated plan set
        "400":
          description: Invalid plan set payload
        "401":
          description: Missing, invalid, or expired access token
        "404":
          description: Plan set not found
    delete:
      summary: Delete plan set
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: setId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Plan set deleted
        "401":
          description: Missing, invalid, or expired access token
        "404":
          description: Plan set not found
  /sessions:
    get:
      summary: List workout sessions
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Paginated session list
    post:
      summary: Start workout session
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Session started
