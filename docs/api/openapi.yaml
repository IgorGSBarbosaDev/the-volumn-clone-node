openapi: 3.1.0
info:
  title: The Volumn API
  version: 0.1.0
servers:
  - url: http://localhost:3000
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    refreshCookieAuth:
      type: apiKey
      in: cookie
      name: refreshToken
  schemas:
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service status
  /auth/register:
    post:
      summary: Register a new user
      description: Creates the user, returns an access token session payload, and sets a rotating refresh token cookie.
      responses:
        "201":
          description: Session created
        "409":
          description: Email already in use
        "429":
          description: Auth rate limit exceeded
  /auth/login:
    post:
      summary: Login
      description: Verifies credentials, returns an access token session payload, and sets a rotating refresh token cookie.
      responses:
        "200":
          description: Session created
        "401":
          description: Invalid credentials
        "429":
          description: Auth rate limit exceeded
  /auth/refresh:
    post:
      summary: Rotate refresh token and access token
      description: Uses the refresh token cookie to issue a fresh access token and a new refresh token cookie.
      security:
        - refreshCookieAuth: []
      responses:
        "200":
          description: Session refreshed
        "401":
          description: Missing, invalid, expired, or revoked refresh token
        "429":
          description: Auth rate limit exceeded
  /auth/logout:
    post:
      summary: Logout current session
      description: Invalidates the current refresh token session and clears the refresh token cookie.
      security:
        - refreshCookieAuth: []
      responses:
        "204":
          description: Logged out
  /users/me:
    get:
      summary: Get current user
      description: Returns the authenticated user's current profile summary for app bootstrap and profile rendering.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user profile
        "401":
          description: Missing, invalid, or expired access token
        "404":
          description: Authenticated user record was not found
    patch:
      summary: Update current user
      description: Updates the authenticated user's self-service profile fields in V0.1. Only `displayName` and `theme` are editable.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                displayName:
                  type: string
                  minLength: 2
                  maxLength: 80
                theme:
                  type: string
                  enum: [rose, green, black]
      responses:
        "200":
          description: Updated user profile
        "400":
          description: Invalid profile update payload
        "401":
          description: Missing, invalid, or expired access token
        "404":
          description: Authenticated user record was not found
  /workout-plans:
    get:
      summary: List workout plans
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Paginated workout plans
    post:
      summary: Create workout plan
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Workout plan created
  /sessions:
    get:
      summary: List workout sessions
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Paginated session list
    post:
      summary: Start workout session
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Session started
